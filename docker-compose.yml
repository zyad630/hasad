version: '3.9'

services:
  web:
    build: ./backend
    command: gunicorn hisba_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       hisba_db
      POSTGRES_USER:     hisba_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hisba_user -d hisba_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  celery:
    build: ./backend
    command: celery -A hisba_backend worker -l info --concurrency 4
    env_file: .env
    depends_on:
      - db
      - redis
    restart: always

  celery-beat:
    build: ./backend
    command: celery -A hisba_backend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    depends_on:
      - web
    restart: always

  # M-03: Automated daily backup at 02:00 with 30-day retention
  backup:
    image: postgres:15-alpine
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_volume:/backups
    env_file: .env
    environment:
      DB_HOST: db
    entrypoint: >
      /bin/sh -c "
        echo '0 2 * * * /bin/sh /backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -d 8
      "
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  static_volume:
  backup_volume:

